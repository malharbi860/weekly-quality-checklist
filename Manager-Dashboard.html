<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #f3f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --accent: #0ea5e9;
      --border: #dbe4ee;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --excellent: #16a34a;
      --vgood: #0ea5e9;
      --good: #d97706;
      --poor: #dc2626;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 20px 0;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .header-inner,
    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
    }

    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    input, select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      font: inherit;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .kpi-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 30px;
      font-weight: 700;
    }

    .charts {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .chart-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .chart-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 950px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #edf2f7;
      text-align: right;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: #f8fbff;
      font-weight: 700;
      color: var(--text);
      position: sticky;
      top: 0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      font-weight: 700;
      min-width: 74px;
      text-align: center;
    }

    .excellent { background: var(--excellent); }
    .vgood { background: var(--vgood); }
    .good { background: var(--good); }
    .poor { background: var(--poor); }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 1000px) {
      .filters,
      .summary,
      .charts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>Manager Dashboard</h1>
      <p>لوحة متابعة مختصرة لعدد التقارير، المواقع، متوسط التقييم، وتصنيف المواقع</p>
    </div>
  </div>

  <div class="container">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="بحث باسم الموقع أو المبنى أو المفتش">
      <select id="regionFilter">
        <option value="">كل المناطق</option>
      </select>
      <select id="classificationFilter">
        <option value="">كل التصنيفات</option>
        <option value="ممتاز">ممتاز</option>
        <option value="جيد جدًا">جيد جدًا</option>
        <option value="جيد">جيد</option>
        <option value="ضعيف">ضعيف</option>
      </select>
      <select id="sortFilter">
        <option value="latest">الأحدث</option>
        <option value="score_desc">الأعلى تقييمًا</option>
        <option value="score_asc">الأقل تقييمًا</option>
        <option value="name">اسم الموقع</option>
      </select>
    </div>

    <div class="summary">
      <div class="card">
        <div class="kpi-label">عدد التقارير</div>
        <div class="kpi-value" id="reportsCount">0</div>
      </div>
      <div class="card">
        <div class="kpi-label">عدد المواقع</div>
        <div class="kpi-value" id="sitesCount">0</div>
      </div>
      <div class="card">
        <div class="kpi-label">متوسط التقييم</div>
        <div class="kpi-value" id="avgScore">0%</div>
      </div>
      <div class="card">
        <div class="kpi-label">المواقع الممتازة</div>
        <div class="kpi-value" id="excellentCount">0</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart-wrap">
        <div class="chart-title">متوسط تقييم المواقع</div>
        <canvas id="siteChart"></canvas>
      </div>

      <div class="chart-wrap">
        <div class="chart-title">توزيع التصنيفات</div>
        <canvas id="classificationChart"></canvas>
      </div>
    </div>

    <div class="table-card">
      <div class="chart-title">ملخص المواقع</div>
      <table>
        <thead>
          <tr>
            <th>الموقع</th>
            <th>المبنى</th>
            <th>المنطقة</th>
            <th>عدد التقارير</th>
            <th>آخر تقييم</th>
            <th>المتوسط</th>
            <th>التصنيف</th>
            <th>آخر تاريخ</th>
          </tr>
        </thead>
        <tbody id="sitesTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let rawReports = [];
    let aggregatedSites = [];
    let siteChart;
    let classificationChart;

    function getClassification(score) {
      if (score >= 90) return "ممتاز";
      if (score >= 80) return "جيد جدًا";
      if (score >= 70) return "جيد";
      return "ضعيف";
    }

    function getClassificationClass(label) {
      if (label === "ممتاز") return "excellent";
      if (label === "جيد جدًا") return "vgood";
      if (label === "جيد") return "good";
      return "poor";
    }

    function safeNumber(value) {
      return Number(value) || 0;
    }

    async function loadReports() {
      try {
        const res = await fetch("./reports.json");
        rawReports = await res.json();
        populateRegionFilter(rawReports);
        applyFilters();
        bindFilters();
      } catch (error) {
        console.error("Failed to load reports.json", error);
        document.getElementById("sitesTableBody").innerHTML =
          '<tr><td colspan="8" class="muted">تعذر قراءة ملف reports.json</td></tr>';
      }
    }

    function populateRegionFilter(reports) {
      const filter = document.getElementById("regionFilter");
      const regions = [...new Set(reports.map(r => r.region).filter(Boolean))];
      regions.sort().forEach(region => {
        const option = document.createElement("option");
        option.value = region;
        option.textContent = region;
        filter.appendChild(option);
      });
    }

    function aggregateReports(reports) {
      const map = new Map();

      reports.forEach(report => {
        const key = `${report.siteName}__${report.buildingName}`;
        if (!map.has(key)) {
          map.set(key, {
            siteName: report.siteName || "-",
            buildingName: report.buildingName || "-",
            region: report.region || "-",
            scores: [],
            count: 0,
            latestDate: report.date || "",
            latestScore: safeNumber(report.overallScore)
          });
        }

        const item = map.get(key);
        item.count += 1;
        item.scores.push(safeNumber(report.overallScore));

        if ((report.date || "") >= item.latestDate) {
          item.latestDate = report.date || "";
          item.latestScore = safeNumber(report.overallScore);
          item.region = report.region || item.region;
        }
      });

      return [...map.values()].map(item => {
        const avg = item.scores.length
          ? Math.round(item.scores.reduce((a, b) => a + b, 0) / item.scores.length)
          : 0;

        return {
          ...item,
          averageScore: avg,
          classification: getClassification(avg)
        };
      });
    }

    function updateKPIs(sites, reports) {
      document.getElementById("reportsCount").textContent = reports.length;
      document.getElementById("sitesCount").textContent = sites.length;

      const avgScore = reports.length
        ? Math.round(reports.reduce((sum, r) => sum + safeNumber(r.overallScore), 0) / reports.length)
        : 0;
      document.getElementById("avgScore").textContent = `${avgScore}%`;

      const excellentCount = sites.filter(s => s.classification === "ممتاز").length;
      document.getElementById("excellentCount").textContent = excellentCount;
    }

    function renderTable(sites) {
      const tbody = document.getElementById("sitesTableBody");
      tbody.innerHTML = "";

      if (!sites.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="muted">لا توجد بيانات مطابقة.</td></tr>';
        return;
      }

      sites.forEach(site => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(site.siteName)}</td>
          <td>${escapeHtml(site.buildingName)}</td>
          <td>${escapeHtml(site.region)}</td>
          <td>${site.count}</td>
          <td>${site.latestScore}%</td>
          <td>${site.averageScore}%</td>
          <td><span class="badge ${getClassificationClass(site.classification)}">${site.classification}</span></td>
          <td>${escapeHtml(site.latestDate || "-")}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderCharts(sites) {
      const labels = sites.map(s => s.siteName.length > 18 ? s.siteName.slice(0, 18) + "..." : s.siteName);
      const avgScores = sites.map(s => s.averageScore);

      const classCounts = {
        "ممتاز": sites.filter(s => s.classification === "ممتاز").length,
        "جيد جدًا": sites.filter(s => s.classification === "جيد جدًا").length,
        "جيد": sites.filter(s => s.classification === "جيد").length,
        "ضعيف": sites.filter(s => s.classification === "ضعيف").length
      };

      if (siteChart) siteChart.destroy();
      if (classificationChart) classificationChart.destroy();

      siteChart = new Chart(document.getElementById("siteChart"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "متوسط التقييم",
            data: avgScores,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 100
            }
          }
        }
      });

      classificationChart = new Chart(document.getElementById("classificationChart"), {
        type: "doughnut",
        data: {
          labels: Object.keys(classCounts),
          datasets: [{
            data: Object.values(classCounts)
          }]
        },
        options: {
          responsive: true
        }
      });
    }

    function applyFilters() {
      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const region = document.getElementById("regionFilter").value;
      const classification = document.getElementById("classificationFilter").value;
      const sort = document.getElementById("sortFilter").value;

      let filteredReports = [...rawReports];

      if (search) {
        filteredReports = filteredReports.filter(r =>
          (r.siteName || "").toLowerCase().includes(search) ||
          (r.buildingName || "").toLowerCase().includes(search) ||
          (r.inspectorName || "").toLowerCase().includes(search)
        );
      }

      if (region) {
        filteredReports = filteredReports.filter(r => r.region === region);
      }

      aggregatedSites = aggregateReports(filteredReports);

      if (classification) {
        aggregatedSites = aggregatedSites.filter(s => s.classification === classification);
      }

      if (sort === "latest") {
        aggregatedSites.sort((a, b) => (b.latestDate || "").localeCompare(a.latestDate || ""));
      } else if (sort === "score_desc") {
        aggregatedSites.sort((a, b) => b.averageScore - a.averageScore);
      } else if (sort === "score_asc") {
        aggregatedSites.sort((a, b) => a.averageScore - b.averageScore);
      } else if (sort === "name") {
        aggregatedSites.sort((a, b) => a.siteName.localeCompare(b.siteName, "ar"));
      }

      updateKPIs(aggregatedSites, filteredReports);
      renderTable(aggregatedSites);
      renderCharts(aggregatedSites);
    }

    function bindFilters() {
      document.getElementById("searchInput").addEventListener("input", applyFilters);
      document.getElementById("regionFilter").addEventListener("change", applyFilters);
      document.getElementById("classificationFilter").addEventListener("change", applyFilters);
      document.getElementById("sortFilter").addEventListener("change", applyFilters);
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadReports();
  </script>
</body>
</html>
