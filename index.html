<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Existing Building Quality Assessment + Gap Analysis</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #f3f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-2: #115e59;
      --accent: #0ea5e9;
      --border: #dbe4ee;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --danger: #dc2626;
      --warning: #d97706;
      --success: #16a34a;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eaf4ff 0%, #f3f7fb 140px, #f3f7fb 100%);
      color: var(--text);
    }

    .header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 24px 0;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .header-inner,
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 34px;
    }

    .brand p {
      margin: 0;
      opacity: 0.95;
      font-size: 15px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, input, textarea, button {
      font: inherit;
    }

    select, input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: 0.2s ease;
      box-shadow: var(--shadow);
    }

    button:hover {
      background: var(--primary-2);
      transform: translateY(-1px);
    }

    .secondary {
      background: #334155;
    }

    .secondary:hover {
      background: #1f2937;
    }

    .danger-btn {
      background: var(--danger);
    }

    .danger-btn:hover {
      background: #b91c1c;
    }

    .container {
      padding-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .card,
    .summary-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 23px;
      color: #0f172a;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      color: #0f172a;
    }

    .summary-box {
      padding: 16px;
      text-align: center;
    }

    .summary-box .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-box .value {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

    .checklist-item {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #ecf1f6;
    }

    .checklist-item:last-child {
      border-bottom: none;
    }

    .item-label {
      font-weight: 600;
      line-height: 1.5;
    }

    .status-ok {
      border-color: rgba(22, 163, 74, 0.35) !important;
      background: rgba(22, 163, 74, 0.06) !important;
    }

    .status-nok {
      border-color: rgba(220, 38, 38, 0.35) !important;
      background: rgba(220, 38, 38, 0.05) !important;
    }

    .status-na {
      border-color: rgba(100, 116, 139, 0.35) !important;
      background: rgba(100, 116, 139, 0.06) !important;
    }

    .photos-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .photos-preview img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: white;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .footer-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .satisfaction-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .rating-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .rating-chip {
      min-width: 48px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }

    .rating-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .badge-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      background: #e8f3ff;
      border: 1px solid #cfe4fb;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .action-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    .action-table th,
    .action-table td {
      border: 1px solid #e5edf5;
      padding: 10px;
      text-align: right;
      vertical-align: top;
      background: #fff;
    }

    .action-table th {
      background: #f0f7ff;
      font-weight: 700;
    }

    .action-table input,
    .action-table select,
    .action-table textarea {
      width: 100%;
      min-width: 120px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font: inherit;
    }

    .action-table textarea {
      min-height: 70px;
    }

    .severity-high {
      color: white;
      background: var(--danger) !important;
    }

    .severity-medium {
      color: white;
      background: var(--warning) !important;
    }

    .severity-low {
      color: white;
      background: var(--success) !important;
    }

    @media (max-width: 1050px) {
      .grid,
      .summary,
      .satisfaction-grid {
        grid-template-columns: 1fr;
      }

      .checklist-item {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 28px;
      }

      .photos-preview img {
        width: 100%;
        max-width: 100%;
        height: auto;
      }
    }
  </style>
</head>

            <span class="badge" id="badge2"></span>
            <span class="badge" id="badge3"></span>
          </div>
        </div>

        <div class="top-actions">
          <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="ar">العربية</option>
            <option value="en">English</option>
          </select>
          <button onclick="generatePDF()" id="pdfBtn"></button>
        </div>
      </div>
    </div>
  </div>

    </div>

    <div class="summary">
      <div class="summary-box">
        <div class="label" id="overallScoreLabel"></div>
        <div class="value" id="overallScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="cleanScoreLabel"></div>
        <div class="value" id="cleanScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="finishScoreLabel"></div>
        <div class="value" id="finishScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="mepScoreLabel"></div>
        <div class="value" id="mepScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="safetyScoreLabel"></div>
        <div class="value" id="safetyScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="facilityScoreLabel"></div>
        <div class="value" id="facilityScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="satisfactionScoreLabel"></div>
        <div class="value" id="satisfactionScore">0/5</div>
      </div>
    </div>

    <div class="card">
      <h2 id="cleanTitle"></h2>
      <div id="cleanChecklist"></div>
    </div>

    <div class="card">
      <h2 id="finishTitle"></h2>
      <div id="finishChecklist"></div>
    </div>

    <div class="card">
      <h2 id="mepTitle"></h2>
      <div id="mepChecklist"></div>
    </div>

    <div class="card">
      <h2 id="safetyTitle"></h2>
      <div id="safetyChecklist"></div>
    </div>

    <div class="card">
      <h2 id="facilityTitle"></h2>
      <div id="facilityChecklist"></div>
    </div>

    <div class="card">
      <h2 id="gapTitle"></h2>
      <div class="table-wrap">
        <table class="action-table" id="actionTable">
          <thead>
            <tr>
              <th id="thItem"></th>
              <th id="thGap"></th>
              <th id="thSeverity"></th>
              <th id="thAction"></th>
              <th id="thOwner"></th>
              <th id="thDueDate"></th>
              <th id="thDelete"></th>
            </tr>
          </thead>
          <tbody id="actionTableBody"></tbody>
        </table>
      </div>

      <div class="actions">
        <button type="button" onclick="addActionRow()" id="addActionBtn"></button>
      </div>
    </div>

    <div class="card">
      <h2 id="satisfactionTitle"></h2>
      <div class="satisfaction-grid">
        <div class="field">
          <label id="satisfactionTypeLabel" for="satisfactionType"></label>
          <select id="satisfactionType"></select>
        </div>

        <div class="field">
          <label id="satisfactionRateLabel"></label>
          <div class="rating-box" id="ratingBox"></div>
          <div class="small-note" id="ratingHint"></div>
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label id="satisfactionNotesLabel" for="satisfactionNotes"></label>
        <textarea id="satisfactionNotes"></textarea>
      </div>
    </div>

    <div class="card">
      <h2 id="notesTitle"></h2>
      <textarea id="notes"></textarea>
    </div>

    <div class="card">
      <h2 id="photosTitle"></h2>
      <input type="file" id="photoInput" multiple accept="image/*" onchange="previewImages(event)" />
      <div class="photos-preview" id="photosPreview"></div>
      <div class="footer-note" id="photoHint"></div>
    </div>

    <div class="actions">
      <button onclick="generatePDF()" id="pdfBtnBottom"></button>
      <button class="secondary" onclick="resetForm()" id="resetBtn"></button>
    </div>
  </div>

        pdfSatisfaction: "Employee / User Satisfaction",
        pdfGap: "Gap Analysis & Corrective Actions",
        pdfPhotos: "Photos",
        pdfGenerated: "Generated",
        pdfBuilding: "Building Name",
        pdfSite: "Site / Complex",
        pdfInspector: "Inspector Name",
        pdfDate: "Date",
        pdfZone: "Zone / Floor / Department",
        pdfOccupancy: "Occupancy Type / Beneficiary",
        pdfStatus: "Status",
        pdfPhotoTitle: "Photo",
        pdfNoPhotos: "No attached photos.",
        pdfNoActions: "No corrective actions entered.",
        itemCol: "Item"
      }
    };

    const sectionIds = ["clean", "finish", "mep", "safety", "facility"];
    let currentLang = "ar";
    let selectedRating = 0;

    const state = {
      clean: [],
      finish: [],
      mep: [],
      safety: [],
      facility: []
    };

    let actionRows = [];

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function getStatusLabel(value, lang = currentLang) {
      const t = translations[lang];
      if (value === "ok") return t.status_ok;
      if (value === "nok") return t.status_nok;
      if (value === "na") return t.status_na;
      return t.status_pending;
    }

    function getStatusClass(value) {
      if (value === "ok") return "status-ok";
      if (value === "nok") return "status-nok";
      if (value === "na") return "status-na";
      return "";
    }

    function createChecklist(sectionName, items) {
      const container = document.getElementById(sectionName + "Checklist");
      container.innerHTML = "";

      items.forEach((item, index) => {
        if (!state[sectionName][index]) state[sectionName][index] = "";

        const row = document.createElement("div");
        row.className = "checklist-item";

        const label = document.createElement("div");
        label.className = "item-label";
        label.textContent = item;

        const select = document.createElement("select");
        select.value = state[sectionName][index];
        select.className = getStatusClass(select.value);
        select.innerHTML = `
          <option value="">${translations[currentLang].status_pending}</option>
          <option value="ok">${translations[currentLang].status_ok}</option>
          <option value="nok">${translations[currentLang].status_nok}</option>
          <option value="na">${translations[currentLang].status_na}</option>
        `;
        select.value = state[sectionName][index];

        select.addEventListener("change", function() {
          state[sectionName][index] = this.value;
          this.classList.remove("status-ok", "status-nok", "status-na");
          const cls = getStatusClass(this.value);
          if (cls) this.classList.add(cls);
          updateScores();
        });

        row.appendChild(label);
        row.appendChild(select);
        container.appendChild(row);
      });
    }

    function renderSatisfactionOptions() {
      const t = translations[currentLang];
      const select = document.getElementById("satisfactionType");
      const currentValue = select.value;

      select.innerHTML = `<option value="">${t.status_pending}</option>`;
      t.satisfactionOptions.forEach(option => {
        const opt = document.createElement("option");
        opt.value = option;
        opt.textContent = option;
        select.appendChild(opt);
      });

      if ([...select.options].some(opt => opt.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function renderRating() {
      const box = document.getElementById("ratingBox");
      box.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const chip = document.createElement("div");
        chip.className = "rating-chip" + (selectedRating === i ? " active" : "");
        chip.textContent = i;
        chip.onclick = () => {
          selectedRating = i;
          renderRating();
          document.getElementById("satisfactionScore").textContent = `${selectedRating}/5`;
        };
        box.appendChild(chip);
      }
    }

    function renderAllChecklists() {
      const t = translations[currentLang];
      createChecklist("clean", t.cleanItems);
      createChecklist("finish", t.finishItems);
      createChecklist("mep", t.mepItems);
      createChecklist("safety", t.safetyItems);
      createChecklist("facility", t.facilityItems);
      updateScores();
    }

    function getSeverityOptions(lang) {
      const t = translations[lang];
      return `
        <option value="">${t.severityPlaceholder}</option>
        <option value="high">${t.severityHigh}</option>
        <option value="medium">${t.severityMedium}</option>
        <option value="low">${t.severityLow}</option>
      `;
    }

    function severityClass(value) {
      if (value === "high") return "severity-high";
      if (value === "medium") return "severity-medium";
      if (value === "low") return "severity-low";
      return "";
    }

    function renderActionRows() {
      const tbody = document.getElementById("actionTableBody");
      tbody.innerHTML = "";

      actionRows.forEach((row, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td><input type="text" value="${escapeHtml(row.item)}" oninput="updateActionField(${index}, 'item', this.value)"></td>
          <td><textarea oninput="updateActionField(${index}, 'gap', this.value)">${escapeHtml(row.gap)}</textarea></td>
          <td>
            <select onchange="updateActionField(${index}, 'severity', this.value); applySeverityClass(this);" class="${severityClass(row.severity)}">
              ${getSeverityOptions(currentLang)}
            </select>
          </td>
          <td><textarea oninput="updateActionField(${index}, 'action', this.value)">${escapeHtml(row.action)}</textarea></td>
          <td><input type="text" value="${escapeHtml(row.owner)}" oninput="updateActionField(${index}, 'owner', this.value)"></td>
          <td><input type="date" value="${escapeHtml(row.dueDate)}" oninput="updateActionField(${index}, 'dueDate', this.value)"></td>
          <td><button type="button" class="danger-btn" onclick="deleteActionRow(${index})">${translations[currentLang].deleteBtn}</button></td>
        `;

        tbody.appendChild(tr);
        const select = tr.querySelector("select");
        select.value = row.severity;
        applySeverityClass(select);
      });
    }

    function applySeverityClass(select) {
      select.classList.remove("severity-high", "severity-medium", "severity-low");
      const cls = severityClass(select.value);
      if (cls) select.classList.add(cls);
    }

    function addActionRow() {
      actionRows.push({
        item: "",
        gap: "",
        severity: "",
        action: "",
        owner: "",
        dueDate: ""
      });
      renderActionRows();
    }

    function deleteActionRow(index) {
      actionRows.splice(index, 1);
      renderActionRows();
    }

    function updateActionField(index, field, value) {
      actionRows[index][field] = value;
    }

    function changeLanguage(lang) {
      currentLang = lang;
      const t = translations[lang];

      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      document.getElementById("languageSelect").value = lang;

      setText("pageTitle", t.pageTitle);
      setText("pageSubtitle", t.pageSubtitle);
      setText("badge1", t.badge1);
      setText("badge2", t.badge2);
      setText("badge3", t.badge3);
      setText("pdfBtn", t.pdfBtn);
      setText("pdfBtnBottom", t.pdfBtn);
      setText("buildingLabel", t.buildingLabel);
      setText("siteLabel", t.siteLabel);
      setText("inspectorLabel", t.inspectorLabel);
      setText("dateLabel", t.dateLabel);
      setText("zoneLabel", t.zoneLabel);
      setText("occupancyLabel", t.occupancyLabel);
      setText("overallScoreLabel", t.overallScoreLabel);
      setText("cleanScoreLabel", t.cleanScoreLabel);
      setText("finishScoreLabel", t.finishScoreLabel);
      setText("mepScoreLabel", t.mepScoreLabel);
      setText("safetyScoreLabel", t.safetyScoreLabel);
      setText("facilityScoreLabel", t.facilityScoreLabel);
      setText("satisfactionScoreLabel", t.satisfactionScoreLabel);
      setText("cleanTitle", t.cleanTitle);
      setText("finishTitle", t.finishTitle);
      setText("mepTitle", t.mepTitle);
      setText("safetyTitle", t.safetyTitle);
      setText("facilityTitle", t.facilityTitle);
      setText("gapTitle", t.gapTitle);
      setText("addActionBtn", t.addActionBtn);
      setText("thItem", t.thItem);
      setText("thGap", t.thGap);
      setText("thSeverity", t.thSeverity);
      setText("thAction", t.thAction);
      setText("thOwner", t.thOwner);
      setText("thDueDate", t.thDueDate);
      setText("thDelete", t.thDelete);
      setText("satisfactionTitle", t.satisfactionTitle);
      setText("satisfactionTypeLabel", t.satisfactionTypeLabel);
      setText("satisfactionRateLabel", t.satisfactionRateLabel);
      setText("satisfactionNotesLabel", t.satisfactionNotesLabel);
      setText("ratingHint", t.ratingHint);
      setText("notesTitle", t.notesTitle);
      setText("photosTitle", t.photosTitle);
      setText("photoHint", t.photoHint);
      setText("resetBtn", t.resetBtn);

      renderSatisfactionOptions();
      renderRating();
      renderAllChecklists();
      renderActionRows();
    }

    function calculateSectionScore(sectionName) {
      const values = state[sectionName] || [];
      const applicable = values.filter(v => v === "ok" || v === "nok");
      const compliant = values.filter(v => v === "ok");

      if (applicable.length === 0) return 0;
      return Math.round((compliant.length / applicable.length) * 100);
    }

    function updateScores() {
      const clean = calculateSectionScore("clean");
      const finish = calculateSectionScore("finish");
      const mep = calculateSectionScore("mep");
      const safety = calculateSectionScore("safety");
      const facility = calculateSectionScore("facility");

      document.getElementById("cleanScore").textContent = clean + "%";
      document.getElementById("finishScore").textContent = finish + "%";
      document.getElementById("mepScore").textContent = mep + "%";
      document.getElementById("safetyScore").textContent = safety + "%";
      document.getElementById("facilityScore").textContent = facility + "%";

      const overall = Math.round((clean + finish + mep + safety + facility) / 5);
      document.getElementById("overallScore").textContent = overall + "%";
    }

    function previewImages(event) {
      const container = document.getElementById("photosPreview");
      container.innerHTML = "";
      Array.from(event.target.files).forEach(file => {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        container.appendChild(img);
      });
    }

    function renderSectionTable(sectionTitle, items, values, lang) {
      const t = translations[lang];
      const rows = items.map((item, i) => `
        <tr>
          <td>${escapeHtml(item)}</td>
          <td>${escapeHtml(getStatusLabel(values[i] || "", lang))}</td>
        </tr>
      `).join("");

      return `
        <section class="pdf-page">
          <div class="pdf-head">
            <div class="pdf-title">${escapeHtml(sectionTitle)}</div>
          </div>

          <table class="pdf-table">
            <thead>
              <tr>
                <th>${escapeHtml(t.itemCol)}</th>
                <th>${escapeHtml(t.pdfStatus)}</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </section>
      `;
    }

    function renderGapTable(lang) {
      const t = translations[lang];
      if (!actionRows.length) {
        return `
          <section class="pdf-page">
            <div class="pdf-head">
              <div class="pdf-title">${escapeHtml(t.pdfGap)}</div>
            </div>
            <div class="text-box">${escapeHtml(t.pdfNoActions)}</div>
          </section>
        `;
      }

      const rows = actionRows.map(row => `
        <tr>
          <td>${escapeHtml(row.item)}</td>
          <td>${escapeHtml(row.gap)}</td>
          <td>${escapeHtml(
            row.severity === "high" ? t.severityHigh :
            row.severity === "medium" ? t.severityMedium :
            row.severity === "low" ? t.severityLow : "-"
          )}</td>
          <td>${escapeHtml(row.action)}</td>
          <td>${escapeHtml(row.owner)}</td>
          <td>${escapeHtml(row.dueDate)}</td>
        </tr>
      `).join("");

      return `
        <section class="pdf-page">
          <div class="pdf-head">
            <div class="pdf-title">${escapeHtml(t.pdfGap)}</div>
          </div>

          <table class="pdf-table">
            <thead>
              <tr>
                <th>${escapeHtml(t.thItem)}</th>
                <th>${escapeHtml(t.thGap)}</th>
                <th>${escapeHtml(t.thSeverity)}</th>
                <th>${escapeHtml(t.thAction)}</th>
                <th>${escapeHtml(t.thOwner)}</th>
                <th>${escapeHtml(t.thDueDate)}</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </section>
      `;
    }

    function generatePDF() {
      const lang = currentLang;
      const t = translations[lang];
      const dir = lang === "ar" ? "rtl" : "ltr";
      const today = new Date();
      const reportNo = "BQA-" + today.toISOString().slice(0, 10).replaceAll("-", "");
      const generatedAt = today.toLocaleString();

      const buildingName = document.getElementById("buildingName").value || "-";
      const siteName = document.getElementById("siteName").value || "-";
      const inspectorName = document.getElementById("inspectorName").value || "-";
      const inspectionDate = document.getElementById("inspectionDate").value || "-";
      const zoneName = document.getElementById("zoneName").value || "-";
      const occupancyType = document.getElementById("occupancyType").value || "-";
      const notes = document.getElementById("notes").value || "-";
      const satisfactionType = document.getElementById("satisfactionType").value || "-";
      const satisfactionNotes = document.getElementById("satisfactionNotes").value || "-";

      const overallScore = document.getElementById("overallScore").textContent;
      const cleanScore = document.getElementById("cleanScore").textContent;
      const finishScore = document.getElementById("finishScore").textContent;
      const mepScore = document.getElementById("mepScore").textContent;
      const safetyScore = document.getElementById("safetyScore").textContent;
      const facilityScore = document.getElementById("facilityScore").textContent;
      const satisfactionScore = document.getElementById("satisfactionScore").textContent;

      const images = Array.from(document.querySelectorAll("#photosPreview img")).map((img, i) => `
        <section class="pdf-page">
          <div class="pdf-head">
            <div class="pdf-title">${escapeHtml(t.pdfPhotoTitle)} ${i + 1}</div>
          </div>
          <div class="photo-page-wrap">
            <img src="${img.src}" alt="photo-${i + 1}">
          </div>
        </section>
      `).join("");

      const html = `
<!DOCTYPE html>
<html lang="${lang}" dir="${dir}">
<head>
<meta charset="UTF-8">
<title>${escapeHtml(t.pdfTitle)}</title>
<style>

</head>
<body>

  <section class="pdf-page">
    <div class="pdf-head">
      <div class="pdf-title">${escapeHtml(t.pdfTitle)}</div>
      <div class="subline">${escapeHtml(t.pdfGenerated)}: ${escapeHtml(generatedAt)} | ${escapeHtml(reportNo)}</div>
    </div>

    <div class="cover-box">

    <div class="spacer"></div>

    <div class="section-title">${escapeHtml(t.satisfactionNotesLabel)}</div>

  <section class="pdf-page">

  ${images || `
  <section class="pdf-page">

      <div class="pdf-title">${escapeHtml(t.pdfPhotos)}</div>

  </section>
  `}

</body>
</html>`;

      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        alert(lang === "ar" ? "يرجى السماح بفتح النوافذ المنبثقة لطباعة التقرير." : "Please allow pop-ups to print the report.");
        return;
      }

      printWindow.document.open();
      printWindow.document.write(html);
      printWindow.document.close();

      printWindow.onload = () => {
        setTimeout(() => {
          printWindow.focus();
          printWindow.print();
        }, 500);
      };
    }

    function resetForm() {
      document.getElementById("buildingName").value = "";
      document.getElementById("siteName").value = "";
      document.getElementById("inspectorName").value = "";
      document.getElementById("inspectionDate").value = "";
      document.getElementById("zoneName").value = "";
      document.getElementById("occupancyType").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("satisfactionNotes").value = "";
      document.getElementById("satisfactionType").value = "";
      document.getElementById("photoInput").value = "";
      document.getElementById("photosPreview").innerHTML = "";
      selectedRating = 0;
      document.getElementById("satisfactionScore").textContent = "0/5";
      actionRows = [];

      sectionIds.forEach(id => {
        state[id] = new Array(translations[currentLang][id + "Items"].length).fill("");
      });

      renderRating();
      renderAllChecklists();
      renderActionRows();
    }

    sectionIds.forEach(id => {
      state[id] = new Array(translations[currentLang][id + "Items"].length).fill("");
    });

    changeLanguage("ar");
    renderActionRows();
  </script>
