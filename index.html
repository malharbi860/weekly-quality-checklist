<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA/QC Inspection</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #f3f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-2: #115e59;
      --accent: #0ea5e9;
      --border: #dbe4ee;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eaf4ff 0%, #f3f7fb 140px, #f3f7fb 100%);
      color: var(--text);
    }

    .header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 24px 0;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .header-inner,
    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 34px;
    }

    .brand p {
      margin: 0;
      opacity: 0.95;
      font-size: 15px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, input, textarea, button {
      font: inherit;
    }

    select, input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: 0.2s ease;
      box-shadow: var(--shadow);
    }

    button:hover {
      background: var(--primary-2);
      transform: translateY(-1px);
    }

    .secondary {
      background: #334155;
    }

    .secondary:hover {
      background: #1f2937;
    }

    .container {
      padding-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .card,
    .summary-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 23px;
      color: #0f172a;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      color: #0f172a;
    }

    .summary-box {
      padding: 16px;
      text-align: center;
    }

    .summary-box .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-box .value {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
    }

    .checklist-item {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #ecf1f6;
    }

    .checklist-item:last-child {
      border-bottom: none;
    }

    .item-label {
      font-weight: 600;
      line-height: 1.5;
    }

    .status-ok {
      border-color: rgba(22, 163, 74, 0.35) !important;
      background: rgba(22, 163, 74, 0.06) !important;
    }

    .status-nok {
      border-color: rgba(220, 38, 38, 0.35) !important;
      background: rgba(220, 38, 38, 0.05) !important;
    }

    .status-na {
      border-color: rgba(100, 116, 139, 0.35) !important;
      background: rgba(100, 116, 139, 0.06) !important;
    }

    .photos-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .photos-preview img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: white;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .footer-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .satisfaction-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .rating-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .rating-chip {
      min-width: 48px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }

    .rating-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .badge-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      background: #e8f3ff;
      border: 1px solid #cfe4fb;
    }

    @media (max-width: 950px) {
      .grid,
      .summary,
      .satisfaction-grid {
        grid-template-columns: 1fr;
      }

      .checklist-item {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 28px;
      }

      .photos-preview img {
        width: 100%;
        max-width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="brand">
          <h1 id="pageTitle"></h1>
          <p id="pageSubtitle"></p>
          <div class="badge-line">
            <span class="badge" id="badge1"></span>
            <span class="badge" id="badge2"></span>
            <span class="badge" id="badge3"></span>
          </div>
        </div>

        <div class="top-actions">
          <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="ar">العربية</option>
            <option value="en">English</option>
          </select>
          <button onclick="generatePDF()" id="pdfBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <div class="field">
          <label id="projectLabel" for="projectName"></label>
          <input id="projectName" type="text" />
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label id="inspectorLabel" for="inspectorName"></label>
          <input id="inspectorName" type="text" />
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label id="dateLabel" for="inspectionDate"></label>
          <input id="inspectionDate" type="date" />
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label id="locationLabel" for="locationName"></label>
          <input id="locationName" type="text" />
        </div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-box">
        <div class="label" id="overallScoreLabel"></div>
        <div class="value" id="overallScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="civilScoreLabel"></div>
        <div class="value" id="civilScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="archScoreLabel"></div>
        <div class="value" id="archScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="elecScoreLabel"></div>
        <div class="value" id="elecScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="mechScoreLabel"></div>
        <div class="value" id="mechScore">0%</div>
      </div>
      <div class="summary-box">
        <div class="label" id="satisfactionScoreLabel"></div>
        <div class="value" id="satisfactionScore">0/5</div>
      </div>
    </div>

    <div class="card">
      <h2 id="civilTitle"></h2>
      <div id="civilChecklist"></div>
    </div>

    <div class="card">
      <h2 id="archTitle"></h2>
      <div id="archChecklist"></div>
    </div>

    <div class="card">
      <h2 id="elecTitle"></h2>
      <div id="elecChecklist"></div>
    </div>

    <div class="card">
      <h2 id="mechTitle"></h2>
      <div id="mechChecklist"></div>
    </div>

    <div class="card">
      <h2 id="satisfactionTitle"></h2>
      <div class="satisfaction-grid">
        <div class="field">
          <label id="satisfactionTypeLabel" for="satisfactionType"></label>
          <select id="satisfactionType"></select>
        </div>

        <div class="field">
          <label id="satisfactionRateLabel"></label>
          <div class="rating-box" id="ratingBox"></div>
          <div class="small-note" id="ratingHint"></div>
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label id="satisfactionNotesLabel" for="satisfactionNotes"></label>
        <textarea id="satisfactionNotes"></textarea>
      </div>
    </div>

    <div class="card">
      <h2 id="notesTitle"></h2>
      <textarea id="notes"></textarea>
    </div>

    <div class="card">
      <h2 id="photosTitle"></h2>
      <input type="file" id="photoInput" multiple accept="image/*" onchange="previewImages(event)" />
      <div class="photos-preview" id="photosPreview"></div>
      <div class="footer-note" id="photoHint"></div>
    </div>

    <div class="actions">
      <button onclick="generatePDF()" id="pdfBtnBottom"></button>
      <button class="secondary" onclick="resetForm()" id="resetBtn"></button>
    </div>
  </div>

      en: {

        projectLabel: "Project Name",

        dateLabel: "Date",
        locationLabel: "Location / Zone",
        overallScoreLabel: "Overall Score",
        civilScoreLabel: "Civil",
        archScoreLabel: "Architectural",
        elecScoreLabel: "Electrical",
        mechScoreLabel: "Mechanical",
        satisfactionScoreLabel: "Satisfaction",
        civilTitle: "Civil Works",

        mechTitle: "Mechanical Works",

        satisfactionTypeLabel: "Evaluation Type",

        satisfactionNotesLabel: "Satisfaction Notes",
        ratingHint: "1 = Very Poor, 5 = Excellent",

        photoHint: "You can upload multiple images for observations or site condition.",
        resetBtn: "Reset",
        status_pending: "Select status",

        satisfactionOptions: ["Client Satisfaction", "On-Site Staff Satisfaction"],

        ],
        elecItems: [

          "Electrical panels are installed in compliance",
          "Cable and panel labeling is clear and correct",
          "Openings around conduits and cables are sealed",
          "Switches and sockets are tested and functional",
          "Cable routes are clean and organized"
        ],
        mechItems: [
          "HVAC ducts are installed correctly",
          "Thermal insulation is properly applied",
          "Plumbing lines are installed with no leakage",
          "Supports and hangers are properly fixed",
          "Flow directions and labels are clearly marked",
          "Pressure and commissioning test results are acceptable"
        ],
        pdfTitle: "Weekly QA/QC Inspection Report",
        pdfProjectInfo: "Project Information",
        pdfScores: "Score Summary",
        pdfGeneralNotes: "General Notes",
        pdfSatisfaction: "Client / Staff Satisfaction",
        pdfPhotos: "Photos",
        pdfPage: "Page",
        pdfGenerated: "Generated",
        pdfType: "Evaluation Type",
        pdfRating: "Satisfaction Rating",
        pdfProject: "Project Name",
        pdfInspector: "Inspector Name",
        pdfDate: "Date",
        pdfLocation: "Location / Zone",
        pdfStatus: "Status",
        pdfPhotoTitle: "Photo"
      }
    };

    const sectionIds = ["civil", "arch", "elec", "mech"];
    let currentLang = "ar";
    let selectedRating = 0;

    const state = {
      civil: [],
      arch: [],
      elec: [],
      mech: []
    };

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function getStatusLabel(value, lang = currentLang) {
      const t = translations[lang];
      if (value === "ok") return t.status_ok;
      if (value === "nok") return t.status_nok;
      if (value === "na") return t.status_na;
      return t.status_pending;
    }

    function getStatusClass(value) {
      if (value === "ok") return "status-ok";
      if (value === "nok") return "status-nok";
      if (value === "na") return "status-na";
      return "";
    }

    function createChecklist(sectionName, items) {
      const container = document.getElementById(sectionName + "Checklist");
      container.innerHTML = "";

      items.forEach((item, index) => {
        if (!state[sectionName][index]) state[sectionName][index] = "";

        const row = document.createElement("div");
        row.className = "checklist-item";

        const label = document.createElement("div");
        label.className = "item-label";
        label.textContent = item;

        const select = document.createElement("select");
        select.value = state[sectionName][index];
        select.className = getStatusClass(select.value);
        select.innerHTML = `
          <option value="">${translations[currentLang].status_pending}</option>
          <option value="ok">${translations[currentLang].status_ok}</option>
          <option value="nok">${translations[currentLang].status_nok}</option>
          <option value="na">${translations[currentLang].status_na}</option>
        `;
        select.value = state[sectionName][index];

        select.addEventListener("change", function() {
          state[sectionName][index] = this.value;
          this.classList.remove("status-ok", "status-nok", "status-na");
          const cls = getStatusClass(this.value);
          if (cls) this.classList.add(cls);
          updateScores();
        });

        row.appendChild(label);
        row.appendChild(select);
        container.appendChild(row);
      });
    }

    function renderSatisfactionOptions() {
      const t = translations[currentLang];
      const select = document.getElementById("satisfactionType");
      const currentValue = select.value;

      select.innerHTML = `<option value="">${t.status_pending}</option>`;
      t.satisfactionOptions.forEach(option => {
        const opt = document.createElement("option");
        opt.value = option;
        opt.textContent = option;
        select.appendChild(opt);
      });

      if ([...select.options].some(opt => opt.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function renderRating() {
      const box = document.getElementById("ratingBox");
      box.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const chip = document.createElement("div");
        chip.className = "rating-chip" + (selectedRating === i ? " active" : "");
        chip.textContent = i;
        chip.onclick = () => {
          selectedRating = i;
          renderRating();
          document.getElementById("satisfactionScore").textContent = `${selectedRating}/5`;
        };
        box.appendChild(chip);
      }
    }

    function renderAllChecklists() {
      const t = translations[currentLang];
      createChecklist("civil", t.civilItems);
      createChecklist("arch", t.archItems);
      createChecklist("elec", t.elecItems);
      createChecklist("mech", t.mechItems);
      updateScores();
    }

    function changeLanguage(lang) {
      currentLang = lang;
      const t = translations[lang];

      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      document.getElementById("languageSelect").value = lang;

      setText("pageTitle", t.pageTitle);
      setText("pageSubtitle", t.pageSubtitle);
      setText("badge1", t.badge1);
      setText("badge2", t.badge2);
      setText("badge3", t.badge3);
      setText("pdfBtn", t.pdfBtn);
      setText("pdfBtnBottom", t.pdfBtn);
      setText("projectLabel", t.projectLabel);
      setText("inspectorLabel", t.inspectorLabel);
      setText("dateLabel", t.dateLabel);
      setText("locationLabel", t.locationLabel);
      setText("overallScoreLabel", t.overallScoreLabel);
      setText("civilScoreLabel", t.civilScoreLabel);
      setText("archScoreLabel", t.archScoreLabel);
      setText("elecScoreLabel", t.elecScoreLabel);
      setText("mechScoreLabel", t.mechScoreLabel);
      setText("satisfactionScoreLabel", t.satisfactionScoreLabel);
      setText("civilTitle", t.civilTitle);
      setText("archTitle", t.archTitle);
      setText("elecTitle", t.elecTitle);
      setText("mechTitle", t.mechTitle);
      setText("satisfactionTitle", t.satisfactionTitle);
      setText("satisfactionTypeLabel", t.satisfactionTypeLabel);
      setText("satisfactionRateLabel", t.satisfactionRateLabel);
      setText("satisfactionNotesLabel", t.satisfactionNotesLabel);
      setText("ratingHint", t.ratingHint);
      setText("notesTitle", t.notesTitle);
      setText("photosTitle", t.photosTitle);
      setText("photoHint", t.photoHint);
      setText("resetBtn", t.resetBtn);

      renderSatisfactionOptions();
      renderRating();
      renderAllChecklists();
    }

    function calculateSectionScore(sectionName) {
      const values = state[sectionName] || [];
      const applicable = values.filter(v => v === "ok" || v === "nok");
      const compliant = values.filter(v => v === "ok");

      if (applicable.length === 0) return 0;
      return Math.round((compliant.length / applicable.length) * 100);
    }

    function updateScores() {
      const civil = calculateSectionScore("civil");
      const arch = calculateSectionScore("arch");
      const elec = calculateSectionScore("elec");
      const mech = calculateSectionScore("mech");

      document.getElementById("civilScore").textContent = civil + "%";
      document.getElementById("archScore").textContent = arch + "%";
      document.getElementById("elecScore").textContent = elec + "%";
      document.getElementById("mechScore").textContent = mech + "%";

      const overall = Math.round((civil + arch + elec + mech) / 4);
      document.getElementById("overallScore").textContent = overall + "%";
    }

    function previewImages(event) {
      const container = document.getElementById("photosPreview");
      container.innerHTML = "";
      Array.from(event.target.files).forEach(file => {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        container.appendChild(img);
      });
    }

    function renderSectionTable(sectionTitle, items, values, lang) {
      const t = translations[lang];
      const rows = items.map((item, i) => `
        <tr>
          <td>${escapeHtml(item)}</td>
          <td>${escapeHtml(getStatusLabel(values[i] || "", lang))}</td>
        </tr>
      `).join("");

      return `
        <section class="pdf-page">
          <div class="pdf-head">
            <div class="pdf-title">${escapeHtml(sectionTitle)}</div>
          </div>

          <table class="pdf-table">
            <thead>
              <tr>
                <th>${lang === "ar" ? "البند" : "Item"}</th>
                <th>${escapeHtml(t.pdfStatus)}</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </section>
      `;
    }

    function generatePDF() {

      const today = new Date();

      const generatedAt = today.toLocaleString();

      const satisfactionNotes = document.getElementById("satisfactionNotes").value || "-";

      const overallScore = document.getElementById("overallScore").textContent;
      const civilScore = document.getElementById("civilScore").textContent;
      const archScore = document.getElementById("archScore").textContent;
      const elecScore = document.getElementById("elecScore").textContent;
      const mechScore = document.getElementById("mechScore").textContent;
      const satisfactionScore = document.getElementById("satisfactionScore").textContent;

          </div>
        </section>
      `).join("");

      const html = `

      const printWindow = window.open("", "_blank");
